server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing (react-router) -- any path that isn't a real
    # static file falls back to index.html instead of 404ing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|woff2?|ttf|svg|ico|png|jpg|jpeg|webp)$ {
        expires 7d;
        access_log off;
    }
}
